#:schema https://yazi-rs.github.io/schemas/yazi.json
# Yazi config. Symlinked to ~/.config/yazi/yazi.toml.
# Adapted from theskumar's dotfiles, with Zed as the editor.

[mgr]
ratio          = [1, 3, 4]   # wider preview pane
show_hidden    = false
show_symlink   = true
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"      # show file sizes inline

[preview]
wrap          = "yes"
tab_size      = 2
image_filter  = "triangle"
image_quality = 75

[opener]
edit = [
  { run = 'zed "$@"', desc = "Zed", orphan = true, for = "macos" },
]
open = [
  { run = 'open "$@"', desc = "Open", for = "macos" },
]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" },
]

[open]
prepend_rules = [
  { url = "*/",                use = ["edit", "open", "reveal"] },
  { mime = "text/*",           use = ["edit", "reveal"] },
  { mime = "inode/empty",      use = ["edit", "reveal"] },
  { mime = "application/json", use = ["edit", "reveal"] },
]
